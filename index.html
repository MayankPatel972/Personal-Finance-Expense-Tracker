<form id="transaction-form">
                <div class="input-row">
                    <div class="form-group">
                        <label>Type</label>
                        <div class="type-toggle">
                            <input type="radio" id="type-expense" name="type" value="expense" checked>
                            <label for="type-expense" class="toggle-btn">Expense</label>
                            
                            <input type="radio" id="type-income" name="type" value="income">
                            <label for="type-income" class="toggle-btn">Income</label>
                            
                            <div class="slider"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            </select>
                    </div>
                </div>
                <div class="input-row">
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="amount" required min="1" step="1" placeholder="e.g. 500">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <button type="submit" class="glow-btn">Add Entry</button>
            </form>
